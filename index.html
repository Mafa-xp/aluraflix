<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button id="theme-toggle" aria-label="Alternar tema" title="Alternar tema">☀️</button>
        
        <header class="page-header">
            <img class="aluraflix-logo" src="assents/aluraflix.png" alt="Aluraflix" />
        </header>

        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <ul class="profiles-container">
                <li>
                    <ol class="profiles">
                        <li>
                            <a href="catalogo/catalogo.html" class="profile">
                                <figure>
                                    <img src="assents/1.png" alt="Retrato de uma mulher de perfil parcial, vestindo um blazer preto elegante, contra um fundo degradê em tons de azul e roxo. Ela possui cabelos castanhos presos e uma expressão serena e profissional.">
                                    <figcaption>Anna</figcaption><!--é usado para definir uma legenda ou descrição para o conteúdo de um elemento pai-->
                                </figure>
                            </a>
                        </li>
                        <li>
                            <a href="catalogo/catalogo.html" class="profile">
                                <figure>
                                    <img src="assents/2.png" alt="Retrato frontal de um homem negro sorridente, com barba bem aparada e cabelo curto. Ele veste um blazer e camisa social pretos, posicionado contra um fundo degradê em tons de azul e violeta.">
                                    <figcaption>Thiago</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li>
                            <a href="catalogo/catalogo.html" class="profile">
                                <figure>
                                    <img src="assents/3.png" alt="Retrato de uma mulher idosa de perfil parcial, vestindo um blaze cinza claro, contra um fundo degradê em tons de azul e roxo. Ela possui cabelos brancos e uma expressão serena e profissional.">
                                    <figcaption>Maria</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li>
                            <a href="catalogo/catalogo.html" class="profile">
                                <figure>
                                    <img src="assents/4.png" alt="Retrato de uma mulher de perfil com traços ocidentais, vestindo um blazer cinza claro elegante, contra um fundo degradê em tons de azul e roxo. Ela possui cabelos castanhos presos e uma expressão serena e profissional.">
                                    <figcaption>Camila</figcaption>
                                </figure>
                            </a>
                        </li>
                    </ol>
                </li>
            </ul>
        </section>

         <section class="gerenciar">
            <button type="button" class="botao-gerenciar">Gerenciar perfis</button>
        </section>

    </main>
    <script src="js/theme.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
